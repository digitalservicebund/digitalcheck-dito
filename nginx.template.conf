worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name erarbeiten.digitalcheck.bund.de;

        return 301 https://digitalcheck.bund.de$request_uri;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # allow Nginx to resolve external domain names (for Posthog upstream)
        resolver $RESOLVER valid=30s ipv6=off;

        # WIP: parameterize nginx root
        root /usr/share/nginx/$NGINX_DIR;
        index index.html;
        include /etc/nginx/mime.types;

        # Enable gzip compression for text-based responses to reduce payload size;
        # only compress sufficiently large responses and selected MIME types.
        gzip_static on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;


        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.posthog.com 'unsafe-eval'; script-src-elem 'self' 'unsafe-inline'; style-src 'self' https://*.posthog.com 'unsafe-inline'; style-src-attr 'unsafe-inline'; font-src 'self' https://*.posthog.com; img-src 'self' data: https://*.posthog.com https://secure-dinosaurs-1a634d1a3d.media.strapiapp.com; media-src 'self' https://secure-dinosaurs-1a634d1a3d.media.strapiapp.com; connect-src 'self' https://*.posthog.com; worker-src 'self' blob: data:;" always;
        add_header Permissions-Policy "geolocation=(), midi=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), fullscreen=(self), payment=(), usb=()" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Cache static assets (_astro/ contains content-hashed files)
        location /_astro/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ~ ^/ph-relay/(.*) {
            # We use our infrastructure as a reverse proxy, to prevent exposing client IPs to this third party
            set $path_suffix $1;
            # Using a variable forces Nginx to use the resolver at runtime
            set $posthog_host "eu.i.posthog.com";

            # Logic: If path starts with /ph-relay/static/, use asset host
            if ($uri ~* "^/ph-relay/static/") {
                set $posthog_host "eu-assets.i.posthog.com";
            }

            # Proxy Pass configuration
            proxy_pass https://$posthog_host/$path_suffix$is_args$args;

            # Copy only necessary headers, excluding any that might reveal client IP
            proxy_pass_request_headers off; # Clear all headers first
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Content-Length $http_content_length;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept $http_accept;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header Cache-Control $http_cache_control;
            proxy_set_header Origin $http_origin;
            proxy_set_header Referer $http_referer;

            # Set mandatory Host header
            proxy_set_header Host $posthog_host;

            # support upstream SSL,
            # see https://serverfault.com/questions/583374/configure-nginx-as-reverse-proxy-with-upstream-ssl
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
        }

        # Handle clean URLs (trailingSlash: "never" in astro.config.mjs)
        location / {
            try_files $uri $uri.html $uri/index.html =404;
        }

        # Health Endpoint for Kubernetes Probe
        location /health-check {
            return 204; # no content
            access_log off; # do not log, these happen every second
        }

        error_page 404 /404.html;
    }
}
