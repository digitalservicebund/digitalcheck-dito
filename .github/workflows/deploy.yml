name: Deploy

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: "Environment to deploy to (production or staging)"
      environment_url:
        required: true
        type: string
        description: "Environment URL"
    secrets:
      GITOPS_DIGITALCHECK_APP_ID:
        required: true
      GITOPS_DIGITALCHECK_APP_PRIVATE_KEY:
        required: true
      ARGOCD_AUTH_TOKEN:
        required: true
      ARGOCD_SERVER_STACKIT:
        required: true
      METRICS_DEPLOYMENT_WEBHOOK_URL:
        required: true
      METRICS_WEBHOOK_TOKEN:
        required: true
      SLACK_BOT_TOKEN:
        required: true
      SLACK_CHANNEL_ID:
        required: true

env:
  PACKAGE_NAME: digitalcheck-dito

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: read
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.environment_url }}
    steps:
      - name: Deploy container image
        uses: digitalservicebund/argocd-deploy@050e50ee533ead763aa61d2e511ae5ae9e769593 # Use the auth-token branch for STACKIT
        with:
          environment: ${{ inputs.environment_name }}-stackit
          version: ${{ github.sha }}
          deploying_repo: ${{ env.PACKAGE_NAME }}
          infra_repo: ${{ github.event.repository.name }}-infra
          github_app_id: ${{ secrets.GITOPS_DIGITALCHECK_APP_ID }}
          github_app_private_key: ${{ secrets.GITOPS_DIGITALCHECK_APP_PRIVATE_KEY }}
          app: digitalcheck-${{ inputs.environment_name }}
          argocd_auth_token: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          argocd_server: ${{ secrets.ARGOCD_SERVER_STACKIT }}

      - name: Report Deployment
        uses: digitalservicebund/track-deployment@5a2815e150e1268983aac5ca04c8c046ed1b614a # v1.1.0
        with:
          project: ${{ env.PACKAGE_NAME }}
          environment: ${{ inputs.environment_name }}
          metrics_deployment_webhook_url: ${{ secrets.METRICS_DEPLOYMENT_WEBHOOK_URL }}
          metrics_webhook_token: ${{ secrets.METRICS_WEBHOOK_TOKEN }}

      - name: Send failure to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.5.0
        if: failure()
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
