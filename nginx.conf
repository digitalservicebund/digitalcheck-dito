server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets generated by Astro
    gzip_static on;

    # Cache static assets (_astro/ contains content-hashed files)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle clean URLs (trailingSlash: "never" in astro.config.mjs)
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
}